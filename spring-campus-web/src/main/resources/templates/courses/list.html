<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignaturas — Campus Virtual</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>Campus Virtual</h2>
        <span class="sidebar-subtitle">Panel Web</span>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a th:href="@{/admin/users}" class="nav-link">
            <span class="nav-icon">👥</span> Usuarios
        </a>
        <a th:href="@{/admin/courses}" class="nav-link active">
            <span class="nav-icon">📚</span> Asignaturas
        </a>
    </nav>
    <div class="sidebar-footer">
        <span class="user-name" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout">Cerrar sesión</button>
        </form>
    </div>
</aside>

<main class="main-content">
    <header class="topbar">
        <h1 class="page-title">Gestión de Asignaturas</h1>
        <div class="topbar-actions">
            <form class="form-inline" method="get" th:action="@{/admin/courses}">
                <input type="search" name="search" class="form-control"
                       placeholder="Buscar por nombre, descripción o profesor..."
                       th:value="${search}">
                <button type="submit" class="btn btn-secondary">Buscar</button>
                <a th:if="${!#strings.isEmpty(search)}" th:href="@{/admin/courses}"
                   class="btn btn-secondary">✕</a>
            </form>
            <a th:href="@{/admin/courses/new}" class="btn btn-primary">+ Nueva asignatura</a>
        </div>
    </header>

    <div class="content-area">

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Profesor</th>
                        <th>Matrículas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.id}">1</td>
                        <td th:text="${course.name}">Asignatura</td>
                        <td th:text="${#strings.abbreviate(course.description ?: '—', 60)}">Descripción</td>
                        <td th:text="${course.professor?.fullName} ?: '—'">Profesor</td>
                        <td>
                            <span class="badge badge-blue" th:text="${course.enrollmentCount}">0</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/courses/{id}(id=${course.id})}"
                               class="btn btn-sm btn-secondary">Ver detalle</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="6" class="text-center text-muted">No hay asignaturas registradas.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

</body>
</html>
