<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Campus Virtual</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>Campus Virtual</h2>
        <span class="sidebar-subtitle">Panel Web</span>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a th:href="@{/admin/users}" class="nav-link active">
            <span class="nav-icon">👥</span> Usuarios
        </a>
        <a th:href="@{/admin/courses}" class="nav-link">
            <span class="nav-icon">📚</span> Asignaturas
        </a>
    </nav>
    <div class="sidebar-footer">
        <span class="user-name" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout">Cerrar sesión</button>
        </form>
    </div>
</aside>

<main class="main-content">
    <header class="topbar">
        <h1 class="page-title">Gestión de Usuarios</h1>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">+ Nuevo usuario</a>
    </header>

    <div class="content-area">

        <!-- Mensajes flash -->
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>

        <!-- Tabla de usuarios -->
        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Nombre completo</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Titulación</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}"
                        th:classappend="${!user.active} ? 'row-inactive'">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}">admin</td>
                        <td th:text="${user.fullName}">Nombre Apellido</td>
                        <td th:text="${user.email} ?: '—'">email@ejemplo.com</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.role.name() == 'ADMIN'} ? 'badge-red' :
                                                  (${user.role.name() == 'PROFESSOR'} ? 'badge-blue' : 'badge-green')"
                                  th:text="${user.role.name()}">ROL</span>
                        </td>
                        <td th:text="${user.degree} ?: '—'">Grado</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.active} ? 'badge-green' : 'badge-gray'"
                                  th:text="${user.active} ? 'Activo' : 'Inactivo'">Estado</span>
                        </td>
                        <td class="actions">
                            <div class="actions-group">
                                <!-- Desactivar / Reactivar según estado -->
                                <form th:if="${user.active}" method="post"
                                      th:action="@{/admin/users/{id}/deactivate(id=${user.id})}"
                                      onsubmit="return confirm('¿Desactivar este usuario?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-danger">Desactivar</button>
                                </form>
                                <form th:unless="${user.active}" method="post"
                                      th:action="@{/admin/users/{id}/activate(id=${user.id})}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-success">Reactivar</button>
                                </form>
                                <!-- Eliminar permanentemente (oculto para la propia cuenta) -->
                                <form th:if="${user.username != currentUsername}" method="post"
                                      th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                      th:attr="onsubmit=|return confirm('¿Eliminar permanentemente al usuario \\'${user.username}\\'? Esta acción no se puede deshacer.')|">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-delete">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="8" class="text-center text-muted">No hay usuarios registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>

</body>
</html>
