<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario — Campus Virtual</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h2>Campus Virtual</h2>
        <span class="sidebar-subtitle">Panel Web</span>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <a th:href="@{/admin/users}" class="nav-link active">
            <span class="nav-icon">👥</span> Usuarios
        </a>
        <a th:href="@{/admin/courses}" class="nav-link">
            <span class="nav-icon">📚</span> Asignaturas
        </a>
    </nav>
    <div class="sidebar-footer">
        <span class="user-name" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout">Cerrar sesión</button>
        </form>
    </div>
</aside>

<main class="main-content">
    <header class="topbar">
        <h1 class="page-title">Nuevo Usuario</h1>
        <a th:href="@{/admin/users}" class="btn btn-secondary">← Volver</a>
    </header>

    <div class="content-area">
        <div class="card form-card">
            <form th:action="@{/admin/users/new}" method="post" th:object="${form}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Nombre de usuario *</label>
                        <input type="text" id="username" th:field="*{username}"
                               class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                               placeholder="ej: alumno4">
                        <span class="field-error" th:if="${#fields.hasErrors('username')}"
                              th:errors="*{username}"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña *</label>
                        <input type="password" id="password" th:field="*{password}"
                               class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                               placeholder="Mínimo 8 caracteres">
                        <span class="field-error" th:if="${#fields.hasErrors('password')}"
                              th:errors="*{password}"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Nombre *</label>
                        <input type="text" id="firstName" th:field="*{firstName}"
                               class="form-control" placeholder="Nombre">
                        <span class="field-error" th:if="${#fields.hasErrors('firstName')}"
                              th:errors="*{firstName}"></span>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Apellidos *</label>
                        <input type="text" id="lastName" th:field="*{lastName}"
                               class="form-control" placeholder="Apellidos">
                        <span class="field-error" th:if="${#fields.hasErrors('lastName')}"
                              th:errors="*{lastName}"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}"
                               class="form-control" placeholder="correo@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="role">Rol *</label>
                        <select id="role" th:field="*{role}" class="form-control">
                            <option value="">— Selecciona un rol —</option>
                            <option th:each="r : ${roles}"
                                    th:value="${r.name()}"
                                    th:text="${r.name()}">ROL</option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('role')}"
                              th:errors="*{role}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="degree">Titulación</label>
                    <input type="text" id="degree" th:field="*{degree}"
                           class="form-control" placeholder="ej: Ingeniería Informática">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Crear usuario</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
