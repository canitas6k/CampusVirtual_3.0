<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual — Acceso</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>Campus Virtual</h1>
            <p>Panel de Administración</p>
        </div>

        <!-- Mensaje de error -->
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <!-- Mensaje de logout -->
        <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="Nombre de usuario"
                       required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="Contraseña"
                       required>
            </div>
            <!-- Token CSRF generado por Spring Security -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
    </div>
</div>

</body>
</html>
